<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SmartStockTracker Architecture</title>
<style>
  @page { size: 1600px 1000px; margin: 0; }
  html, body { margin:0; padding:0; background:#ffffff; }

  text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
</style>
</head>
<body>

  <text x="800" y="52" text-anchor="middle" font-size="13" font-style="italic" fill="#6b7280">Phase 1 components shown unchanged; Phase 2 additions marked NEW</text>

  <!-- ===== Group containers ===== -->
  <rect x="650" y="90" width="300" height="90" rx="10" fill="none" stroke="#94a3b8" stroke-dasharray="6,4"/>
  <text x="662" y="107" font-size="12" fill="#64748b">User's Browser</text>

  <rect x="40" y="210" width="1520" height="290" rx="10" fill="none" stroke="#94a3b8" stroke-dasharray="6,4"/>

  <rect x="640" y="530" width="560" height="170" rx="10" fill="none" stroke="#94a3b8" stroke-dasharray="6,4"/>

  <text x="52" y="747" font-size="12" fill="#64748b">Scheduled runner — NEW</text>

    <line x1="800" y1="160" x2="175" y2="240"/>

    <line x1="1425" y1="385" x2="1425" y2="570"/>

    <line x1="300" y1="797.5" x2="340" y2="797.5"/>
    <line x1="455" y1="770" x2="1112.5" y2="385"/>

  <rect x="60" y="240" width="230" height="55" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="175" y="263" text-anchor="middle" font-size="13" fill="#1e1b4b">app.py</text>
  <text x="175" y="280" text-anchor="middle" font-size="11" fill="#4338ca">Search (Phase 1)</text>

  <rect x="372.5" y="240" width="230" height="55" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="487.5" y="263" text-anchor="middle" font-size="13" fill="#1e1b4b">pages/1_Watchlist.py</text>

  <rect x="685" y="240" width="230" height="55" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>

  <rect x="1310" y="240" width="230" height="55" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1425" y="263" text-anchor="middle" font-size="13" fill="#14532d">pages/4_Dashboard.py</text>
  <text x="1425" y="280" text-anchor="middle" font-size="11" fill="#16a34a">NEW</text>

  <rect x="372.5" y="330" width="230" height="55" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="487.5" y="353" text-anchor="middle" font-size="13" fill="#1e1b4b">watchlist_service.py</text>
  <text x="487.5" y="370" text-anchor="middle" font-size="11" fill="#4338ca">Phase 1</text>

  <rect x="685" y="330" width="230" height="55" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="800" y="353" text-anchor="middle" font-size="13" fill="#1e1b4b">news_service.py</text>
  <text x="800" y="370" text-anchor="middle" font-size="11" fill="#4338ca">Phase 1</text>

  <rect x="997.5" y="330" width="230" height="55" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1112.5" y="353" text-anchor="middle" font-size="13" fill="#14532d">alert_service.py</text>
  <text x="1112.5" y="370" text-anchor="middle" font-size="11" fill="#16a34a">NEW</text>

  <rect x="1310" y="330" width="230" height="55" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>

  <text x="1425" y="370" text-anchor="middle" font-size="11" fill="#16a34a">NEW</text>

  <rect x="340" y="570" width="230" height="55" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="455" y="602" text-anchor="middle" font-size="13" fill="#78350f">Yahoo Finance (yfinance)</text>

  <rect x="1310" y="570" width="230" height="55" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="1425" y="592" text-anchor="middle" font-size="13" fill="#78350f">SMTP account</text>
  <text x="1425" y="608" text-anchor="middle" font-size="10.5" fill="#b45309">(user-supplied)</text>

  <rect x="70" y="770" width="230" height="55" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>

  <rect x="1440" y="930" width="20" height="20" rx="4" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
